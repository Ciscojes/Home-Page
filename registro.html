<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro</title>

    <!-- Hojas de estilo -->
    <link rel="stylesheet" href="css/auth.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body class="auth-page">
    <main>
      <form class="auth-form" id="register-form" action="login.html" method="get">
        <h1 class="auth-title">Crear Cuenta</h1>

        <label class="auth-label" for="nombre">Nombre</label>
        <input
          class="auth-input"
          type="text"
          id="nombre"
          name="nombre"
          placeholder="Tu nombre completo"
          required
        />

        <label class="auth-label" for="email">Correo Electrónico</label>
        <input
          class="auth-input"
          type="email"
          id="email"
          name="email"
          placeholder="correo@ejemplo.com"
          required
        />

        <label class="auth-label" for="password">Contraseña</label>
        <input
          class="auth-input"
          type="password"
          id="password"
          name="password"
          placeholder="Crea una contraseña"
          required
        />

        <button class="auth-button" type="submit">Registrarme</button>

        <p class="auth-social-text">O regístrate con:</p>

        <div class="auth-icons">
          <a href="#" aria-label="Registrarse con Google">
            <i class="bi bi-google"></i>
          </a>

          <a href="#" aria-label="Registrarse con Facebook">
            <i class="bi bi-facebook"></i>
          </a>

          <a href="#" aria-label="Registrarse con Microsoft">
            <i class="bi bi-microsoft"></i>
          </a>
        </div>

        <p class="auth-switch">
          ¿Ya tienes cuenta?
          <a href="login.html">Inicia sesión</a>
        </p>
      </form>
    </main>

    <!-- Script de Autenticación -->
    <script src="js/auth.js"></script>
  </body>
</html>
