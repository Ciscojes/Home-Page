<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Mis Accesos Favoritos</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header>
      <div>
        <span>Mis Accesos</span>
      </div>

      <div>
        <span>¡Hola, <strong>Usuario</strong>!</span>

        <a href="login.html">
          <span>Salir</span>
        </a>
      </div>
    </header>

    <main>
      <aside>
        <section>
          <h2>Buscador</h2>

          <form
            action="https://www.google.com/search"
            method="get"
            target="_blank"
          >
            <div>
              <input
                type="search"
                name="q"
                placeholder="Buscar en Google..."
                required
              />

              <button type="submit">Buscar</button>
            </div>
          </form>
        </section>

        <section>
          <h2>Nuevo Acceso</h2>

          <form>
            <div>
              <label>
                Nombre del Sitio

                <input
                  type="text"
                  name="nombre"
                  placeholder="Ej. GitHub"
                  required
                />
              </label>
            </div>

            <div>
              <label>
                URL

                <input
                  type="url"
                  name="url"
                  placeholder="https://ejemplo.com"
                  required
                />
              </label>
            </div>

            <div>
              <label>
                Categoría

                <select name="categoria" required>
                  <option value="Trabajo">Trabajo</option>
                  <option value="IA">IA</option>
                  <option value="Social">Social</option>
                  <option value="Entretenimiento">Entretenimiento</option>
                  <option value="Finanzas">Finanzas</option>
                  <option value="Herramientas">Herramientas</option>
                </select>
              </label>
            </div>

            <button type="submit">Guardar Acceso</button>
          </form>
        </section>
      </aside>

      <section>
        <section>
          <button>Todos</button>
          <button>Trabajo</button>
          <button>IA</button>
          <button>Social</button>
          <button>Entretenimiento</button>
          <button>Finanzas</button>
          <button>Herramientas</button>
        </section>

        <section>
          <h2>Tus Accesos Directos</h2>

          <div>
            <!-- Aquí se agregarán los accesos -->
          </div>

          <div>
            <p>Aún no tienes accesos guardados en esta categoría.</p>

            <span>
              ¡Utiliza el formulario lateral para agregar tu primer acceso!
            </span>
          </div>
        </section>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 - Página de Inicio Personalizable</p>

      <p>Desarrollado con código limpio.</p>
    </footer>
  </body>
</html>
