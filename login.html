<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión</title>

    <!-- Hojas de estilo -->
    <link rel="stylesheet" href="css/auth.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body class="auth-page">
    <main>
      <form class="auth-form" id="login-form" action="index.html" method="get">
        <h1 class="auth-title">Iniciar Sesión</h1>

        <label class="auth-label" for="email">Correo Electrónico</label>
        <input
          class="auth-input"
          type="email"
          id="email"
          name="email"
          placeholder="correo@ejemplo.com"
          required
        />

        <label class="auth-label" for="password">Contraseña</label>
        <input
          class="auth-input"
          type="password"
          id="password"
          name="password"
          placeholder="********"
          required
        />

        <button class="auth-button" type="submit">Entrar</button>

        <p class="auth-social-text">O inicia sesión con:</p>

        <div class="auth-icons">
          <a href="#" aria-label="Iniciar sesión con Google">
            <i class="bi bi-google"></i>
          </a>

          <a href="#" aria-label="Iniciar sesión con Facebook">
            <i class="bi bi-facebook"></i>
          </a>

          <a href="#" aria-label="Iniciar sesión con Microsoft">
            <i class="bi bi-microsoft"></i>
          </a>
        </div>

        <p class="auth-switch">
          ¿No tienes cuenta?
          <a href="registro.html">Crear cuenta</a>
        </p>
      </form>
    </main>

    <!-- Script de Autenticación -->
    <script src="js/auth.js"></script>
  </body>
</html>
